<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720" font-family="'DejaVu Sans Mono', 'Menlo', monospace">
  <defs>
    <style>
      .title  { font-family: 'DejaVu Sans', sans-serif; font-size: 22px; font-weight: 700; fill: #1b1b25; }
      .sub    { font-family: 'DejaVu Sans', sans-serif; font-size: 13px; fill: #5b5b6b; }
      .addr   { font-size: 13px; fill: #2a2a38; }
      .region { font-family: 'DejaVu Sans', sans-serif; font-size: 16px; font-weight: 700; }
      .size   { font-family: 'DejaVu Sans', sans-serif; font-size: 13px; }
      .use    { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; }
      .tag    { font-family: 'DejaVu Sans', sans-serif; font-size: 11px; font-weight: 700; }
      .note   { font-family: 'DejaVu Sans', sans-serif; font-size: 11px; fill: #5b5b6b; }
    </style>
  </defs>
  <rect width="1040" height="720" fill="#f7f7fb" y="0" x="0"/>
  <text class="title" x="40" y="46" style="white-space: pre;">Deluge SPI-NOR Flash Layout</text>
  <text class="sub" x="40" y="68" style="white-space: pre;">S25FL032-class · 4 MB · 64 KB uniform erase blocks · 256-byte program pages</text>
  <text class="sub" x="100.216" y="93.114" font-weight="700" style="white-space: pre; font-size: 13px;">offset</text>
  <text class="sub" x="654.957" y="96.632" font-weight="700" text-anchor="middle" style="white-space: pre; font-size: 13px;">memory-mapped read addr</text>
  <g>
    <rect x="160" y="112" width="440" height="70" fill="#d7def0" stroke="#5566aa" stroke-width="1.5"/>
    <text class="addr" x="150" y="118" text-anchor="end" style="white-space: pre;">0x000000</text>
    <text class="region" x="180" y="142" fill="#27324f" style="white-space: pre;">First-Stage Bootloader (FSB)</text>
    <text class="use" x="180" y="162" style="white-space: pre;">reserved · not writable through MAP</text>
    <text class="size" x="580" y="152" text-anchor="end" fill="#27324f" style="white-space: pre;">256 KB</text>
    <text class="addr" x="656" y="117" text-anchor="middle" style="white-space: pre; font-size: 13px;">0x1800_0000</text>
  </g>
  <g>
    <rect x="160" y="182" width="440" height="86" fill="#e6e0f2" stroke="#7a5fb0" stroke-width="1.5"/>
    <text class="addr" x="150" y="188" text-anchor="end" style="white-space: pre;">0x040000</text>
    <text class="region" x="180" y="208" fill="#3d2a5c" style="white-space: pre;">Deluge device-settings region</text>
    <text class="use" x="180" y="226" style="white-space: pre;">reserved · shared with stock rza1 firmware</text>
    <text class="size" x="580" y="200" text-anchor="end" fill="#3d2a5c" style="white-space: pre;">256 KB</text>
    <text class="addr" x="657" y="187" text-anchor="middle" style="white-space: pre; font-size: 13px;">0x1804_0000</text>
    <rect x="300" y="238" width="300" height="24" fill="#fff4cf" stroke="#c79a18" stroke-width="1.2"/>
    <text class="tag" x="312" y="254" fill="#7a5f0a" style="white-space: pre;">0x070000  FlashStorage  64 KB  (writable)</text>
    <text class="note" x="180" y="255" style="white-space: pre;">record @ 0x07F000</text>
  </g>
  <g>
    <rect x="160" y="268" width="440" height="92" fill="#c9dcef" stroke="#4477aa" stroke-width="1.5"/>
    <text class="addr" x="150" y="274" text-anchor="end" style="white-space: pre;">0x080000</text>
    <text class="region" x="180" y="298" fill="#1f3f5c" style="white-space: pre;">Second-Stage Bootloader (SSB)</text>
    <text class="use" x="180" y="318" style="white-space: pre;">reserved · not writable through MAP</text>
    <text class="size" x="580" y="308" text-anchor="end" fill="#1f3f5c" style="white-space: pre;">512 KB</text>
    <text class="addr" x="655" y="273" text-anchor="middle" style="white-space: pre; font-size: 13px;">0x1808_0000</text>
  </g>
  <g>
    <rect x="160" y="360" width="440" height="208" fill="#d7efdb" stroke="#3a8a4f" stroke-width="2"/>
    <text class="addr" x="150" y="366" text-anchor="end" style="white-space: pre;">0x100000</text>
    <text class="region" x="180" y="400" fill="#1f5c32" style="white-space: pre;">App Slot — flashed app</text>
    <text class="use" x="180" y="422" style="white-space: pre;">WRITABLE · SLOT_OFFSET = 0x100000</text>
    <text class="use" x="180" y="440" style="white-space: pre;">44 × 64 KB erase blocks</text>
    <text class="size" x="580" y="410" text-anchor="end" fill="#1f5c32" font-weight="700" style="white-space: pre;">2.75 MB</text>
    <text class="addr" x="656" y="365" text-anchor="middle" style="white-space: pre; font-size: 13px;">0x1810_0000</text>
    <text class="addr" x="656" y="380" text-anchor="middle" font-size="11" style="white-space: pre; font-size: 13px;">(SLOT_ADDR)</text>
    <text class="note" x="380" y="500" text-anchor="middle" style="white-space: pre;">sits above FSB/SSB so storing an</text>
    <text class="note" x="380" y="516" text-anchor="middle" style="white-space: pre;">app can never touch reserved regions</text>
  </g>
  <g>
    <rect x="160" y="568" width="440" height="40" fill="#fff4cf" stroke="#c79a18" stroke-width="1.5"/>
    <text class="addr" x="150" y="574" text-anchor="end" style="white-space: pre;">0x3C0000</text>
    <text class="region" x="180" y="588" font-size="14" fill="#7a5f0a" style="white-space: pre;">App-loader settings</text>
    <text class="use" x="180" y="603" style="white-space: pre;">WRITABLE · SETTINGS_OFFSET</text>
    <text class="size" x="580" y="595" text-anchor="end" fill="#7a5f0a" style="white-space: pre;">64 KB</text>
    <text class="addr" x="657" y="573" text-anchor="middle" style="white-space: pre; font-size: 13px;">0x183C_0000</text>
  </g>
  <g>
    <rect x="160" y="608" width="440" height="48" fill="#eeeeee" stroke="#999999" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text class="addr" x="150" y="614" text-anchor="end" style="white-space: pre;">0x3D0000</text>
    <text class="region" x="180" y="630" font-size="14" fill="#555" style="white-space: pre;">unused / reserved tail</text>
    <text class="size" x="580" y="636" text-anchor="end" fill="#555" style="white-space: pre;">192 KB</text>
    <text class="addr" x="150" y="668" text-anchor="end" style="white-space: pre;">0x400000</text>
  </g>
  <line x1="160" y1="656" x2="600" y2="656" stroke="#444" stroke-width="2"/>
  <text class="note" x="180" y="676" fill="#444" style="white-space: pre;">end of chip (0x400000) — offsets ≥ this alias modulo 4 MB onto a low sector</text>
  <g transform="matrix(1, 0, 0, 1, 759.734753, 397.754248)">
    <text class="sub" x="0" y="0" font-weight="700" style="white-space: pre;">Legend</text>
    <rect x="0" y="12" width="18" height="14" fill="#d7efdb" stroke="#3a8a4f"/>
    <text class="note" x="26" y="24" style="white-space: pre;">writable through MAP</text>
    <rect x="0" y="34" width="18" height="14" fill="#fff4cf" stroke="#c79a18"/>
    <text class="note" x="26" y="46" style="white-space: pre;">writable settings block</text>
    <rect x="0" y="56" width="18" height="14" fill="#d7def0" stroke="#5566aa"/>
    <text class="note" x="26" y="68" style="white-space: pre;">reserved (FSB / SSB)</text>
    <rect x="0" y="78" width="18" height="14" fill="#e6e0f2" stroke="#7a5fb0"/>
    <text class="note" x="26" y="90" style="white-space: pre;">reserved (device-settings)</text>
    <rect x="0" y="100" width="18" height="14" fill="#eeeeee" stroke="#999" stroke-dasharray="3 2"/>
    <text class="note" x="26" y="112" style="white-space: pre;">unused</text>
  </g>
</svg>
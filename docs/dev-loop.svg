<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" width="440" height="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Push-to-run dev loop: edit code, cargo deluge run, ELF over USB upload, loader to RAM, app runs, and back to edit code.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- clockwise arrows between adjacent nodes -->
  <g fill="none" stroke="#9aa0a6" stroke-width="2.2" marker-end="url(#arrow)">
    <line x1="243" y1="67"  x2="340" y2="137"/>
    <line x1="357" y1="171" x2="314" y2="304"/>
    <line x1="233" y1="321" x2="207" y2="321"/>
    <line x1="126" y1="304" x2="83"  y2="171"/>
    <line x1="100" y1="137" x2="197" y2="67"/>
  </g>

  <!-- center caption -->
  <text x="220" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#9aa0a6">push-to-run</text>
  <text x="220" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#9aa0a6">loop</text>

  <!-- nodes (uniform 150x34 rounded rects, white text on indigo) -->
  <g font-size="14" fill="#ffffff" text-anchor="middle">
    <g><rect x="145" y="33"  width="150" height="34" rx="9" fill="#6366f1"/><text x="220" y="55">edit code</text></g>
    <g><rect x="288" y="137" width="150" height="34" rx="9" fill="#6366f1"/><text x="363" y="159">cargo deluge run</text></g>
    <g><rect x="233" y="304" width="150" height="34" rx="9" fill="#6366f1"/><text x="308" y="326">ELF &#8594; USB upload</text></g>
    <g><rect x="57"  y="304" width="150" height="34" rx="9" fill="#6366f1"/><text x="132" y="326">loader &#8594; RAM</text></g>
    <g><rect x="2"   y="137" width="150" height="34" rx="9" fill="#6366f1"/><text x="77"  y="159">app runs</text></g>
  </g>
</svg>

[package]
name = "input_demo"
version = "0.1.0"
edition = "2024"
license.workspace = true
description = "Deluge SDK example: react to the unified input event stream."

[[bin]]
name = "input_demo"
test = false

[dependencies]
deluge = { path = "../../deluge" }
embassy-executor = { workspace = true, features = [
    "nightly",
    "platform-cortex-ar",
    "executor-thread",
] }

[features]
default = []

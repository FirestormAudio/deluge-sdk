[package]
name = "pad_paint"
version = "0.1.0"
edition = "2024"
license.workspace = true
description = "Deluge SDK example: press pads to paint the RGB grid."

[[bin]]
name = "pad_paint"
test = false

[dependencies]
deluge = { path = "../../crates/deluge" }
embassy-executor = { workspace = true, features = [
    "nightly",
    "platform-cortex-ar",
    "executor-thread",
] }

[features]
default = []
## Opt-in RTT (SEGGER) logging over a debug probe.
rtt = ["deluge/rtt"]

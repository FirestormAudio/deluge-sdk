[package]
name = "oled_hello"
version = "0.1.0"
edition = "2024"
license.workspace = true
description = "Deluge SDK example: draw to the OLED with embedded-graphics."

[[bin]]
name = "oled_hello"
test = false

[dependencies]
deluge = { path = "../../deluge" }
embassy-executor = { workspace = true, features = [
    "nightly",
    "platform-cortex-ar",
    "executor-thread",
] }
embassy-time = { workspace = true, features = ["tick-hz-1_000_000"] }
embedded-graphics = "0.8"

[features]
default = []

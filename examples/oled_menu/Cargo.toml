[package]
publish = false  # binary crate — not for crates.io
name = "oled_menu"
version = "0.1.0"
edition = "2024"
# Links the GPL deluge-ui-toolkit, so the example is GPL too.
license = "GPL-3.0-or-later"
description = "Deluge SDK example: an immediate-mode settings menu on the OLED."

[[bin]]
name = "oled_menu"
test = false

[dependencies]
# `alloc` enables the SRAM global allocator the UI toolkit needs.
deluge = { path = "../../crates/deluge-sdk", package = "deluge-sdk", features = ["alloc"] }
deluge-ui-toolkit = { path = "../../crates/deluge-ui-toolkit" }
embassy-executor = { workspace = true, features = [
    "nightly",
    "platform-cortex-ar",
    "executor-thread",
] }

[features]
default = []
## Opt-in RTT (SEGGER) logging over a debug probe.
rtt = ["deluge/rtt"]

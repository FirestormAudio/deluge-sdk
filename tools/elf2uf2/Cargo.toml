[package]
name = "elf2uf2"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "elf2uf2"
path = "src/main.rs"

[dependencies]
# Intentionally none — pure std so it builds offline with no supply chain.

[dev-dependencies]
# In-repo only (no external supply chain): the firmware's UF2 wire-format crate,
# used to round-trip elf2uf2's output through the *same* classifier + erase-map
# the on-device app-loader uses — proving the two sides agree (plan §5.1).
deluge-image = { path = "../../crates/deluge-image" }

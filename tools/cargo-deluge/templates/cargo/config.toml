# Build for the Deluge (RZ/A1L, Cortex-A9) by default. `cargo deluge build`/`run`
# pass `-Zbuild-std` explicitly (the embedded target has no prebuilt `core`), so
# use those rather than a plain `cargo build`. `cargo deluge sim` overrides this
# with `--target <host>` to run the app in the desktop simulator against the
# host's prebuilt std — so build-std must NOT be forced globally here.
[build]
target = "armv7a-none-eabihf"

[target.armv7a-none-eabihf]
rustflags = [
    "-C", "target-cpu=cortex-a9",
    "-C", "target-feature=+neon",
    "-C", "link-arg=--gc-sections",
    "-C", "force-frame-pointers=yes",
]

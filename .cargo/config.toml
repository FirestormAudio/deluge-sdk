[build]
target = "armv7a-none-eabihf"

# ---------------------------------------------------------------------------
# armv7-unknown-linux-gnueabihf — used for QEMU benchmark runs only.
# Run: cargo bench --target armv7-unknown-linux-gnueabihf
#
# qemu-arm -cpu cortex-a9 emulates Cortex-A9 including VFPv3-D16 and NEON.
# The RUSTFLAGS here match the embedded target so codegen is representative.
# ---------------------------------------------------------------------------
[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"
runner = ["qemu-arm", "-cpu", "cortex-a9", "-L", "/usr/arm-linux-gnueabihf"]
rustflags = [
  "-C", "target-cpu=cortex-a9",
  "-C", "target-feature=+neon",
]

[target.armv7a-none-eabihf]
rustflags = [
  "-C", "target-cpu=cortex-a9",
  "-C", "target-feature=+neon",
  "-C", "link-arg=--gc-sections",
  "-C", "force-frame-pointers=yes",
]

[alias]
# Used when building the embedded firmware for armv7a-none-eabihf.
# build-std cannot live in [unstable] because it applies to all targets,
# breaking host-native `cargo test` for the rza1/deluge-bsp crates.
# build-fw-bin requires cargo-binutils (`cargo install cargo-binutils`).
build-fw      = "build -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem"
build-fw-rel  = "build -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem --release --no-default-features"
# For apps that use `alloc` (e.g. the GPL deluge-ui-toolkit menu/text): adds the
# alloc crate to build-std. Usage: cargo build-fw-alloc -p oled_menu
build-fw-alloc = "build -Zbuild-std=core,alloc -Zbuild-std-features=compiler-builtins-mem"
build-fw-bin  = "objcopy -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem --release --no-default-features -p demo-firmware -- -O binary target/armv7a-none-eabihf/release/demo-firmware.bin"
build-controller-bin = "objcopy -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem --release --no-default-features -p deluge-controller -- -O binary target/armv7a-none-eabihf/release/deluge-controller.bin"
build-msc            = "build -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem -p msc-firmware"
build-msc-bin        = "objcopy -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem --release --no-default-features -p msc-firmware -- -O binary target/armv7a-none-eabihf/release/msc-firmware.bin"
build-app-loader     = "build -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem -p app-loader"
build-app-loader-bin = "objcopy -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem --release --no-default-features -p app-loader -- -O binary target/armv7a-none-eabihf/release/app-loader.bin"
# Host-side ELF -> Deluge-SSB UF2 converter (tools/elf2uf2). The explicit
# --target overrides the armv7a [build] target above so it builds for the host.
# Usage: cargo elf2uf2 path/to/firmware.elf [-o out.uf2] [--bin]
elf2uf2              = "run --manifest-path tools/elf2uf2/Cargo.toml --target x86_64-unknown-linux-gnu --release --"
build-wren           = "build -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem -p wren-firmware"
build-wren-bin       = "objcopy -Zbuild-std=core -Zbuild-std-features=compiler-builtins-mem --release --no-default-features -p wren-firmware -- -O binary target/armv7a-none-eabihf/release/wren-firmware.bin"

[env]
# UAC2 (3 ifaces) + CDC-ACM (2 ifaces) + USB-MIDI (2 ifaces) = 7 total.
EMBASSY_USB_MAX_INTERFACE_COUNT = "8"

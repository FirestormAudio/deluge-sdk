[workspace]
members = ["firmwares/demo-firmware", "firmwares/controller-firmware", "firmwares/msc-firmware", "rza1l-hal", "deluge-bsp", "deluge-fft", "app-loader"]
# Host-side tooling: built for the host triple, not the embedded armv7a target,
# so it must not be a member of this no_std cross-compiled workspace.
exclude = ["tools/elf2uf2"]
resolver = "2"

[workspace.package]
license = "MIT OR Apache-2.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
debug = true

[profile.release.package.deluge-fft]
opt-level = 3

[profile.dev]
opt-level = 1
debug = true
